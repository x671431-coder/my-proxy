<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Proxy Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #1a1a2e; color: white; height: 100vh; display: flex; flex-direction: column; }
    .bar { display: flex; gap: 8px; padding: 12px; background: #16213e; }
    .bar input {
      flex: 1; padding: 10px 16px; border-radius: 24px;
      border: none; font-size: 15px; outline: none;
      background: #0f3460; color: white;
    }
    .bar input::placeholder { color: #aaa; }
    .bar button {
      padding: 10px 22px; border-radius: 24px; border: none;
      background: #e94560; color: white; font-size: 15px;
      cursor: pointer; font-weight: bold;
    }
    .bar button:hover { background: #c73652; }
    iframe { flex: 1; border: none; background: white; }
  </style>
</head>
<body>
  <div class="bar">
    <input id="url" type="text" placeholder="Enter a website (e.g. https://example.com)" />
    <button onclick="go()">Go</button>
  </div>
  <iframe id="frame"></iframe>

  <script>
    const BACKEND = 'https://my-proxy-kws7.onrender.com';

    function go() {
      let url = document.getElementById('url').value.trim();
      if (!url.startsWith('http')) url = 'https://' + url;
      document.getElementById('frame').src = BACKEND + '/fetch?url=' + encodeURIComponent(url);
    }

    document.getElementById('url').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') go();
    });
  </script>
</body>
</html>
